workflows:
  android-release-workflow:
    name: Android Release APK Build (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - keystore_credentials # Note: Set these up in Codemagic UI if signing is needed
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web App
        script: |
          npm run build
      - name: Capacitor Sync
        script: |
          npx cap sync android
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/app-release-unsigned.apk
    publishing:
      email:
        recipients:
          - sm.rakib.773@gmail.com
        notify:
          success: true
          failure: true
